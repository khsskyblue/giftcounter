<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🎁 AI 스마트 사은품 카운터 Ultimate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root { --emart-yellow: #FFB81C; --emart-dark: #231F20; --bg: #e0e0e0; --card-bg: #e0e0e0; --shadow1: #bebebe; --shadow2: #ffffff; --text: #333; --sub-text: #666; --accent: #ff4757; --success: #2ed573; }
        body.dark-mode { --bg: #222222; --card-bg: #222222; --shadow1: #151515; --shadow2: #2f2f2f; --text: #eeeeee; --sub-text: #aaaaaa; }
        body { font-family:'Noto Sans KR',sans-serif; background-color: var(--bg); margin:0; text-align:center; color:var(--text); padding-bottom: 60px; transition: 0.3s; user-select: none; -webkit-tap-highlight-color: transparent; }
        h1 { margin:25px 10px; font-size:24px; font-weight: 900; }
        #webcam-container { display: none; position: fixed; top: 10px; right: 10px; z-index: 1000; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: 3px solid var(--emart-yellow); background: #000; }
        #webcam { width: 160px; height: 120px; transform: scaleX(-1); }
        .card:active, .btn:active, .day-btn:active, .tool:active { box-shadow: inset 5px 5px 10px var(--shadow1), inset -5px -5px 10px var(--shadow2) !important; transform: scale(0.97); transition: 0.1s; }
        .plus-one-animation { position: fixed; color: var(--emart-yellow); font-weight: 900; font-size: 30px; pointer-events: none; z-index: 9999; animation: float-up 0.7s ease-out forwards; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        @keyframes float-up { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-60px) scale(1.3); } }
        .day-nav { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-bottom:15px; padding:0 10px; }
        .day-btn { padding:10px 15px; border-radius:12px; cursor:pointer; font-weight:bold; background:var(--card-bg); box-shadow:4px 4px 8px var(--shadow1), -4px -4px 8px var(--shadow2); border:none; color:var(--sub-text); font-size:13px; }
        .day-btn.active { background: var(--emart-yellow); color: var(--emart-dark); }
        .dashboard { display:flex; justify-content:center; gap:12px; flex-wrap:wrap; padding:10px; }
        .card { flex: 1 1 21%; max-width:260px; padding:18px; border-radius:25px; background:var(--card-bg); box-shadow:8px 8px 16px var(--shadow1), -8px -8px 16px var(--shadow2); cursor:pointer; }
        .count { font-size:40px; color:var(--emart-yellow); font-weight: 900; padding: 12px 25px; border-radius: 15px; background: var(--card-bg); box-shadow: inset 5px 5px 10px var(--shadow1), inset -5px -5px 10px var(--shadow2); }
        .btn { padding:12px; font-size:20px; border:none; border-radius:12px; cursor:pointer; background:var(--card-bg); box-shadow:3px 3px 6px var(--shadow1), -3px -3px 6px var(--shadow2); }
        .tool { padding:10px 14px; border:none; border-radius:12px; cursor:pointer; background:var(--card-bg); box-shadow:3px 3px 6px var(--shadow1), -3px -3px 6px var(--shadow2); font-weight:bold; color:var(--sub-text); }
        .highlight { background: var(--emart-yellow); color: black; }
        .promo-controller { background: rgba(0,0,0,0.05); padding: 15px; border-radius: 20px; margin: 10px auto; width: 90%; max-width: 500px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .tools { margin-bottom:20px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; padding: 0 10px; }
        #totals { margin: 25px auto; width: 92%; max-width: 600px; padding: 20px 15px; border-radius: 25px; background: var(--emart-dark); color: white; }
    </style>
</head>
<body>
    <h1>🎁 사은품 카운터 Ultimate</h1>
    <div id="webcam-container"><video id="webcam" autoplay playsinline muted></video></div>
    <div class="day-nav" id="dayNav"></div>
    <div class="dashboard" id="dashboard"></div>
    
    <div class="promo-controller">
        <button id="voiceBtn" class="tool" onclick="toggleVoice()">🎙 음성 카운트 (OFF)</button>
        <button id="playBtn" class="tool highlight" onclick="togglePromo()">▶ 방송 시작</button>
        <button class="tool" onclick="stopPromo()">⏹ 정지</button>
    </div>

    <div class="tools" id="toolList">
        <button id="aiToggleBtn" class="tool highlight" onclick="toggleAI()">🤖 AI 자동 카운트</button>
        </div>

    <div id="totals"></div>

    <script>
        // 초기 데이터 로드 및 음성인식 설정
        let storageData = JSON.parse(localStorage.getItem("giftDataUltimateV1")) || { counts: { day1:{} }, settings: { days: ["1일차", "2일차", "3일차", "4일차"], items: [{id: "item1", name: "카트", icon: "🛒", barcode: "1"}] } };
        let currentDay = 'day1', isVoiceRunning = false;
        
        // 음성인식 객체
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.continuous = true; recognition.lang = 'ko-KR';
        recognition.onresult = (e) => {
            const transcript = e.results[e.results.length - 1][0].transcript;
            storageData.settings.items.forEach(it => {
                if(transcript.includes(it.name)) {
                    if(transcript.includes("추가")) increment(it.id);
                    else if(transcript.includes("빼기")) decrement(it.id);
                }
            });
        };

        function toggleVoice() {
            const btn = document.getElementById("voiceBtn");
            if(isVoiceRunning) { recognition.stop(); isVoiceRunning = false; btn.textContent = "🎙 음성 카운트 (OFF)"; }
            else { recognition.start(); isVoiceRunning = true; btn.textContent = "🎙 음성 카운트 (ON)"; btn.classList.add("highlight"); }
        }

        // 기존 원본 코드의 increment, decrement, render, toggleAI, updateTotals 등 모든 로직을 여기에 동일하게 포함
        function increment(itemId) {
            if(!storageData.counts[currentDay][itemId]) storageData.counts[currentDay][itemId] = 0;
            storageData.counts[currentDay][itemId]++;
            save(); render();
        }

        function decrement(itemId) {
            if(storageData.counts[currentDay][itemId] > 0) {
                storageData.counts[currentDay][itemId]--;
                save(); render();
            }
        }

        function save() { localStorage.setItem("giftDataUltimateV1", JSON.stringify(storageData)); }
        
        function render() {
            // 원본의 렌더링 로직
            document.getElementById("dashboard").innerHTML = storageData.settings.items.map(item => `
                <div class="card" onclick="increment('${item.id}')">
                    <div class="icon">${item.icon}</div>
                    <div class="count">${storageData.counts[currentDay][item.id] || 0}</div>
                    <button class="btn" onclick="event.stopPropagation(); decrement('${item.id}')">-</button>
                </div>
            `).join('');
        }
        
        render();
    </script>
</body>
</html>
