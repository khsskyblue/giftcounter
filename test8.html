<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🎁 AI 스마트 사은품 카운터 Ultimate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root { --emart-yellow: #FFB81C; --emart-dark: #231F20; --bg: #e0e0e0; --card-bg: #e0e0e0; --shadow1: #bebebe; --shadow2: #ffffff; --text: #333; --sub-text: #666; --accent: #ff4757; --success: #2ed573; }
        body.dark-mode { --bg: #222222; --card-bg: #222222; --shadow1: #151515; --shadow2: #2f2f2f; --text: #eeeeee; --sub-text: #aaaaaa; }
        body { font-family:'Noto Sans KR',sans-serif; background-color: var(--bg); margin:0; text-align:center; color:var(--text); padding-bottom: 60px; transition: 0.3s; user-select: none; -webkit-tap-highlight-color: transparent; }
        h1 { margin:25px 10px; font-size:24px; font-weight: 900; }
        
        /* 웹캠 스타일 */
        #webcam-container { display: none; position: fixed; top: 10px; right: 10px; z-index: 1000; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: 3px solid var(--emart-yellow); background: #000; }
        #webcam { width: 160px; height: 120px; transform: scaleX(-1); }

        /* 뉴모피즘 버튼 및 카드 효과 */
        .card:active, .btn:active, .day-btn:active, .tool:active { box-shadow: inset 5px 5px 10px var(--shadow1), inset -5px -5px 10px var(--shadow2) !important; transform: scale(0.97); transition: 0.1s; }
        @keyframes float-up { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-60px) scale(1.3); } }
        .plus-one-animation { position: fixed; color: var(--emart-yellow); font-weight: 900; font-size: 30px; pointer-events: none; z-index: 9999; animation: float-up 0.7s ease-out forwards; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 50% { transform: translateX(6px); } }
        .shake-animation { animation: shake 0.2s ease-in-out; }

        .day-nav { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-bottom:15px; padding:0 10px; }
        .day-btn { padding:10px 15px; border-radius:12px; cursor:pointer; font-weight:bold; background:var(--card-bg); box-shadow:4px 4px 8px var(--shadow1), -4px -4px 8px var(--shadow2); border:none; color:var(--sub-text); font-size:13px; }
        .day-btn.active { background: var(--emart-yellow); color: var(--emart-dark); box-shadow: inset 2px 2px 4px rgba(0,0,0,0.2); }

        .dashboard { display:flex; justify-content:center; gap:12px; flex-wrap:wrap; padding:10px; }
        .card { flex: 1 1 21%; max-width:260px; padding:18px; border-radius:25px; background:var(--card-bg); box-shadow:8px 8px 16px var(--shadow1), -8px -8px 16px var(--shadow2); cursor:pointer; position:relative; overflow:hidden; border: 3px solid transparent; }
        .icon { font-size:35px; margin-bottom:8px; pointer-events: none; }
        .title { font-size:16px; font-weight:bold; pointer-events: none; }
        .count { font-size:40px; margin:8px; color:var(--emart-yellow); font-weight: 900; pointer-events: none; }
        
        .buttons { display:flex; gap:8px; margin-top:10px; }
        .btn { flex:1; padding:12px; font-size:20px; border:none; border-radius:12px; cursor:pointer; background:var(--card-bg); box-shadow:3px 3px 6px var(--shadow1), -3px -3px 6px var(--shadow2); color:var(--text); font-weight: bold; }

        .main-input { padding:14px; font-size:15px; border:none; border-radius:20px; background:var(--card-bg); box-shadow:inset 4px 4px 8px var(--shadow1), inset -4px -4px 8px var(--shadow2); width:85%; max-width:380px; margin:15px 0; outline:none; text-align:center; color: var(--text); }
        .promo-controller { background: rgba(0,0,0,0.05); padding: 15px; border-radius: 20px; margin: 10px auto; width: 90%; max-width: 500px; display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
        
        .tools { margin-bottom:20px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; padding: 0 10px; }
        .tool { padding:10px 14px; border:none; border-radius:12px; cursor:pointer; background:var(--card-bg); box-shadow:3px 3px 6px var(--shadow1), -3px -3px 6px var(--shadow2); font-size:12px; font-weight:bold; color:var(--sub-text); }
        .tool.highlight { background: var(--emart-yellow); color: black; }

        .memo-section { margin: 15px auto; width: 90%; max-width: 580px; text-align: left; }
        .memo-list { margin-top: 8px; background: rgba(0,0,0,0.04); border-radius: 12px; padding: 12px; font-size: 12px; max-height: 100px; overflow-y: auto; color: var(--sub-text); line-height: 1.6; }

        .chart-container { margin: 20px auto; width: 90%; max-width: 580px; padding: 18px; border-radius: 20px; background: var(--card-bg); box-shadow: 8px 8px 16px var(--shadow1), -8px -8px 16px var(--shadow2); }
        .chart-bars { display: flex; align-items: flex-end; justify-content: space-between; height: 80px; border-bottom: 2px solid #666; padding-top:10px; }
        .bar { width: 50%; background: var(--emart-yellow); border-radius: 3px 3px 0 0; }

        #totals { margin: 25px auto; width: 92%; max-width: 600px; padding: 20px 15px; border-radius: 25px; background: var(--emart-dark); color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .total-header { font-size: 13px; color: var(--emart-yellow); margin-bottom: 12px; font-weight: 900; }
        .total-grid { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .total-badge { background: rgba(255, 255, 255, 0.08); padding: 8px 12px; border-radius: 15px; display: flex; align-items: center; gap: 6px; }

        /* 모달 스타일 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--bg); padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; max-height: 85vh; overflow-y: auto; text-align: left; color: var(--text); }
        .modal-btn { padding: 12px; background: var(--emart-yellow); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🎁 사은품 카운터 Ultimate</h1>

    <div id="webcam-container">
        <video id="webcam" autoplay playsinline muted></video>
        <div style="font-size: 10px; color: white; padding: 2px;">AI 자동 탐지 중...</div>
    </div>
            
    <div class="day-nav" id="dayNav"></div>

    <div class="dashboard" id="dashboard"></div>
            
    <input id="barcodeInput" class="main-input" placeholder="바코드 스캔 또는 번호 입력 후 엔터" autofocus>

    <div class="promo-controller">
        <div style="font-weight:bold; font-size:14px; margin-right:5px;">📣 다국어 사은품 방송</div>
        <button id="playBtn" class="tool highlight" onclick="togglePromo()">▶ 방송 시작</button>
        <button class="tool" onclick="stopPromo()">⏹ 정지</button>
        <select id="voiceSelect" class="tool" onchange="stopPromo()">
            <option value="ko">🇰🇷 한국어</option>
            <option value="en">🇺🇸 English</option>
            <option value="ja">🇯🇵 日本語</option>
            <option value="zh">🇨🇳 中文</option>
        </select>
    </div>

    <div class="tools">
        <button id="aiToggleBtn" class="tool highlight" onclick="toggleAI()">🤖 AI 자동 카운트</button>
        <button class="tool" onclick="copySummary()">📋 카톡 보고용 복사</button>
        <button class="tool" onclick="undoLastAction()">⏪ 실행 취소</button>
        <button class="tool" onclick="toggleTheme()">🌓 테마 변경</button>
        <button class="tool" onclick="checkAdmin(openSettings)">⚙️ 설정</button>
        <button class="tool" onclick="downloadAdvancedCSV()">📊 엑셀 저장</button>
        <button class="tool" onclick="backupData()">💾 백업</button>
        <button class="tool" onclick="checkAdmin(resetToday)" style="color:#d9534f; border:1px solid #d9534f;">오늘 초기화</button>
        <button class="tool" onclick="checkAdmin(deleteAllData)" style="background:#ff4757; color:white;">⚠️ 전체 삭제</button>
    </div>

    <div class="memo-section">
        <div style="display:flex; gap:8px;">
            <input id="memoInput" class="main-input" style="flex:1; margin:0;" placeholder="특이사항 메모...">
            <button class="tool" style="margin:0;" onclick="addMemo()">기록</button>
        </div>
        <div class="memo-list" id="memoList"></div>
    </div>

    <div class="chart-container">
        <div style="font-size:12px; margin-bottom:10px; font-weight:bold; color:var(--sub-text);">📈 시간대별 배포 추이</div>
        <div class="chart-bars" id="hourlyChart"></div>
    </div>

    <div id="totals"></div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h3 style="margin-top:0;">⚙️ 시스템 설정</h3>
            <div id="settingsItems"></div>
            <hr style="border:0.5px solid #ccc; margin:15px 0;">
            <p style="font-size:12px; color:var(--sub-text);">관리자 비밀번호 변경 (기본: 0000)</p>
            <input type="password" id="adminPwInput" class="main-input" style="width:92%; margin:5px 0;" placeholder="새 비밀번호">
            <button class="modal-btn" onclick="saveSettings()">저장 및 적용</button>
            <button class="modal-btn" style="background:#bbb;" onclick="closeSettings()">닫기</button>
        </div>
    </div>

<script>
// [1. 초기 데이터 및 설정]
const DEFAULT_SETTINGS = {
    days: ["1일차", "2일차", "3일차", "4일차"],
    adminPw: "0000",
    items: [
        {id: "item1", name: "카트", icon: "🛒", barcode: "1", target: 100},
        {id: "item2", name: "라면", icon: "🍜", barcode: "2", target: 200},
        {id: "item3", name: "물티슈", icon: "🧻", barcode: "3", target: 150},
        {id: "item4", name: "배달", icon: "🚚", barcode: "4", target: 50}
    ]
};

let currentDay = 'day1', undoStack = [], isPlaying = false;
let storageData = JSON.parse(localStorage.getItem("giftDataUltimateV1")) || {
    counts: { day1:{}, day2:{}, day3:{}, day4:{} },
    logs: [],
    memos: [],
    settings: JSON.parse(JSON.stringify(DEFAULT_SETTINGS))
};

// AI 변수
let model = null, isAiRunning = false, lastDetectedTime = 0;

// [2. 핵심 유틸리티 함수]
function save() { localStorage.setItem("giftDataUltimateV1", JSON.stringify(storageData)); }

function checkAdmin(cb) {
    const pw = prompt("관리자 비밀번호를 입력하세요:");
    if(pw === storageData.settings.adminPw) cb();
    else if(pw !== null) alert("비밀번호가 틀렸습니다.");
}

// [3. 초기화 및 삭제 기능 (요청 사항)]
function resetToday() {
    const dayName = storageData.settings.days[parseInt(currentDay.replace('day',''))-1];
    if(!confirm(`⚠️ [${dayName}]의 모든 카운트와 기록을 삭제할까요?`)) return;

    storageData.counts[currentDay] = {};
    storageData.logs = storageData.logs.filter(l => l.day !== currentDay);
    storageData.memos = storageData.memos.filter(m => m.day !== currentDay);
    
    undoStack = [];
    save(); render();
    alert(`${dayName} 데이터가 초기화되었습니다.`);
}

function deleteAllData() {
    if(!confirm("⚠️ 경고: 모든 날짜의 데이터, 설정, 로그가 영구 삭제됩니다.")) return;
    if(!confirm("정말 실행하시겠습니까? 이 작업은 취소할 수 없습니다.")) return;

    localStorage.removeItem("giftDataUltimateV1");
    alert("시스템이 초기화되었습니다. 페이지를 새로고침합니다.");
    location.reload();
}

// [4. 카운팅 로직]
function increment(itemId, event) {
    if (navigator.vibrate) navigator.vibrate(35);
    if (event && event.clientX) {
        const span = document.createElement("span");
        span.textContent = "+1";
        span.className = "plus-one-animation";
        span.style.left = event.clientX + "px";
        span.style.top = (event.clientY - 40) + "px";
        document.body.appendChild(span);
        setTimeout(() => span.remove(), 700);
    }
    
    if(!storageData.counts[currentDay][itemId]) storageData.counts[currentDay][itemId] = 0;
    storageData.counts[currentDay][itemId]++;
    
    const log = { time: new Date().toLocaleTimeString(), day: currentDay, item: itemId, hour: new Date().getHours() };
    storageData.logs.push(log);
    undoStack.push({ type:'inc', day:currentDay, item:itemId, log:log });
    
    save(); render();
}

function decrement(itemId) {
    if (storageData.counts[currentDay][itemId] > 0) {
        storageData.counts[currentDay][itemId]--;
        const idx = storageData.logs.slice().reverse().findIndex(l => l.day === currentDay && l.item === itemId);
        if(idx > -1) {
            const actualIdx = storageData.logs.length - 1 - idx;
            undoStack.push({ type:'dec', day:currentDay, item:itemId, log:storageData.logs.splice(actualIdx, 1)[0] });
        }
        save(); render();
    }
}

// [5. 렌더링 함수]
function render() {
    const counts = storageData.counts[currentDay] || {};
    document.getElementById("dashboard").innerHTML = storageData.settings.items.map(item => {
        const count = counts[item.id] || 0;
        return `<div class="card" onclick="increment('${item.id}', event)">
                    <div class="icon">${item.icon}</div><div class="title">${item.name}</div>
                    <div class="count">${count}</div>
                    <div class="buttons">
                        <button class="btn" onclick="event.stopPropagation(); increment('${item.id}', event)">+</button>
                        <button class="btn" onclick="event.stopPropagation(); decrement('${item.id}')">-</button>
                    </div>
                </div>`;
    }).join('');
    renderNav(); updateTotals(); updateChart(); renderMemos();
}

function renderNav() {
    document.getElementById("dayNav").innerHTML = storageData.settings.days.map((day, idx) => 
        `<button class="day-btn ${currentDay==='day'+(idx+1)?'active':''}" onclick="currentDay='day${idx+1}'; render();">${day}</button>`
    ).join('');
}

function updateTotals() {
    let totals = {};
    storageData.settings.items.forEach(it => {
        totals[it.id] = { icon: it.icon, count: 0 };
        for(let d in storageData.counts) totals[it.id].count += (storageData.counts[d][it.id] || 0);
    });
    let html = `<div class="total-header">📊 전 기간 누적 합계</div><div class="total-grid">`;
    Object.values(totals).forEach(d => { html += `<div class="total-badge"><span>${d.icon}</span><span>${d.count.toLocaleString()}</span></div>`; });
    document.getElementById("totals").innerHTML = html + `</div>`;
}

function updateChart() {
    const hourly = new Array(24).fill(0);
    storageData.logs.filter(l => l.day === currentDay).forEach(l => hourly[l.hour]++);
    let html = "";
    const maxVal = Math.max(...hourly, 1);
    for(let i = 10; i <= 21; i++) {
        const h = (hourly[i] / maxVal) * 100;
        html += `<div style="flex:1; display:flex; flex-direction:column; align-items:center;">
                    <span style="font-size:8px;">${hourly[i]||''}</span>
                    <div class="bar" style="height:${h}%"></div>
                    <span style="font-size:8px; margin-top:3px;">${i}</span>
                 </div>`;
    }
    document.getElementById("hourlyChart").innerHTML = html;
}

// [6. AI 및 기타 기능]
async function toggleAI() {
    const btn = document.getElementById("aiToggleBtn");
    const video = document.getElementById("webcam");
    if (!isAiRunning) {
        if (!model) { btn.textContent = "⏳ 로딩..."; model = await cocoSsd.load(); }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            document.getElementById("webcam-container").style.display = "block";
            isAiRunning = true; btn.textContent = "⏹ AI 중지";
            detectFrame(video);
        } catch (err) { alert("카메라를 사용할 수 없습니다."); }
    } else {
        isAiRunning = false;
        if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        document.getElementById("webcam-container").style.display = "none";
        btn.textContent = "🤖 AI 자동 카운트";
    }
}

async function detectFrame(video) {
    if (!isAiRunning) return;
    const predictions = await model.detect(video);
    predictions.forEach(p => {
        if ((p.class === 'bottle' || p.class === 'cell phone') && p.score > 0.85) {
            const now = Date.now();
            if (now - lastDetectedTime > 2500) {
                increment('item1'); // 인식 시 첫 번째 품목 증가
                lastDetectedTime = now;
                document.getElementById("webcam-container").style.borderColor = "#2ed573";
                setTimeout(() => document.getElementById("webcam-container").style.borderColor = "var(--emart-yellow)", 500);
            }
        }
    });
    requestAnimationFrame(() => detectFrame(video));
}

function togglePromo() {
    if (isPlaying) return stopPromo();
    const lang = document.getElementById("voiceSelect").value;
    const scripts = { 
        'ko': "사은행사 안내드립니다. 카트 사은품은 8만원 이상 구매 시 증정해 드립니다.",
        'en': "Welcome! Free gifts are available for purchases over 80,000 won.",
        'ja': "いらっしゃいませ。8万ウォン以上お買い上げの方にプレゼントを差し上げます。",
        'zh': "欢迎光临。购物满 8 万韩元即可获得赠品。"
    };
    const msg = new SpeechSynthesisUtterance(scripts[lang]);
    msg.lang = lang;
    msg.onend = () => { isPlaying = false; document.getElementById("playBtn").textContent = "▶ 방송 시작"; };
    window.speechSynthesis.speak(msg);
    isPlaying = true; document.getElementById("playBtn").textContent = "■ 방송 중...";
}

function stopPromo() { window.speechSynthesis.cancel(); isPlaying = false; document.getElementById("playBtn").textContent = "▶ 방송 시작"; }

function openSettings() {
    document.getElementById("settingsItems").innerHTML = storageData.settings.items.map((item, idx) =>
    `<div style="display:flex; gap:5px; margin-bottom:5px;">
        <input class="tool" style="width:35px; text-align:center;" id="s_icon_${idx}" value="${item.icon}">
        <input class="tool" style="flex:1;" id="s_name_${idx}" value="${item.name}">
        <input class="tool" style="width:50px;" id="s_bc_${idx}" value="${item.barcode}">
    </div>`).join('');
    document.getElementById("settingsModal").classList.add("show");
}

function closeSettings() { document.getElementById("settingsModal").classList.remove("show"); }

function saveSettings() {
    storageData.settings.items.forEach((item, idx) => {
        item.icon = document.getElementById(`s_icon_${idx}`).value;
        item.name = document.getElementById(`s_name_${idx}`).value;
        item.barcode = document.getElementById(`s_bc_${idx}`).value;
    });
    const newPw = document.getElementById("adminPwInput").value;
    if(newPw) storageData.settings.adminPw = newPw;
    save(); closeSettings(); render();
}

function undoLastAction() {
    if (undoStack.length === 0) return alert("되돌릴 기록이 없습니다.");
    const a = undoStack.pop();
    if(a.type === 'inc') {
        storageData.counts[a.day][a.item]--;
        const i = storageData.logs.indexOf(a.log);
        if(i > -1) storageData.logs.splice(i, 1);
    } else {
        storageData.counts[a.day][a.item]++;
        storageData.logs.push(a.log);
    }
    save(); render();
}

function copySummary() {
    let text = `[${storageData.settings.days[parseInt(currentDay.replace('day',''))-1]} 현황]\n`;
    storageData.settings.items.forEach(item => {
        text += `${item.icon} ${item.name}: ${storageData.counts[currentDay][item.id] || 0}개\n`;
    });
    navigator.clipboard.writeText(text).then(() => alert("보고용 텍스트 복사 완료!"));
}

function addMemo() {
    const input = document.getElementById("memoInput");
    if(!input.value.trim()) return;
    storageData.memos.push({ day: currentDay, text: `[${new Date().toLocaleTimeString()}] ${input.value}` });
    input.value = ""; save(); renderMemos();
}

function renderMemos() {
    const filtered = storageData.memos.filter(m => m.day === currentDay);
    document.getElementById("memoList").innerHTML = filtered.length ? filtered.map(m => `<div>${m.text}</div>`).reverse().join('') : "기록 없음";
}

function toggleTheme() { document.body.classList.toggle('dark-mode'); }

function backupData() {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([JSON.stringify(storageData)], {type:"application/json"}));
    a.download = `gift_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
}

function downloadAdvancedCSV() {
    let csv = "\uFEFF품목,합계\n";
    storageData.settings.items.forEach(item => {
        let sum = 0;
        for(let d in storageData.counts) sum += (storageData.counts[d][item.id] || 0);
        csv += `${item.name},${sum}\n`;
    });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    link.download = `사은품_현황_보고서.csv`;
    link.click();
}

// 바코드 입력 감지
document.getElementById("barcodeInput").addEventListener("keypress", (e) => {
    if (e.key === 'Enter') {
        const val = document.getElementById("barcodeInput").value.trim();
        const item = storageData.settings.items.find(i => i.barcode === val);
        if (item) {
            increment(item.id);
            document.body.classList.add("shake-animation");
            setTimeout(() => document.body.classList.remove("shake-animation"), 200);
        }
        document.getElementById("barcodeInput").value = '';
    }
});

// 초기 실행
render();
</script>
</body>
</html>
