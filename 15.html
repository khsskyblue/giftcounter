<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🎁 AI 스마트 사은품 카운터 Ultimate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root { --emart-yellow: #FFB81C; --emart-dark: #231F20; --bg: #e0e0e0; --card-bg: #e0e0e0; --shadow1: #bebebe; --shadow2: #ffffff; --text: #333; --sub-text: #666; --accent: #ff4757; --success: #2ed573; }
        body.dark-mode { --bg: #222222; --card-bg: #222222; --shadow1: #151515; --shadow2: #2f2f2f; --text: #eeeeee; --sub-text: #aaaaaa; }
        body { font-family:'Noto Sans KR',sans-serif; background-color: var(--bg); margin:0; text-align:center; color:var(--text); padding-bottom: 60px; transition: 0.3s; user-select: none; -webkit-tap-highlight-color: transparent; }
        h1 { margin:65px 10px 20px; font-size:24px; font-weight: 900; }
        #installBtn { display: none; margin: 15px auto; padding: 12px 20px; border-radius: 20px; border:none; background: var(--success); color: white; font-weight: bold; cursor: pointer; box-shadow: 4px 4px 8px var(--shadow1); }
        /* 기존 스타일 생략 (원본과 동일) */
        #dynamic-island-container { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; }
        .dynamic-island { width: 120px; height: 35px; background: #000; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; transition: all 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.4); opacity: 0.95; }
        .dynamic-island.active { width: 300px; height: 65px; border-radius: 35px; background: #1a1a1a; }
        .island-content { display: none; align-items: center; gap: 15px; padding: 0 25px; white-space: nowrap; width: 100%; }
        .dynamic-island.active .island-content { display: flex; animation: fadeIn 0.3s ease-in; }
        .island-icon { font-size: 28px; }
        .island-text { display: flex; flex-direction: column; text-align: left; }
        .island-main { font-size: 16px; color: var(--emart-yellow); font-weight: 900; }
        .island-sub { font-size: 12px; color: #aaa; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        #webcam-container { display: none; position: fixed; top: 10px; right: 10px; z-index: 1000; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: 3px solid var(--emart-yellow); background: #000; }
        #webcam { width: 160px; height: 120px; transform: scaleX(-1); }
        .card:active, .btn:active, .day-btn:active, .tool:active { box-shadow: inset 5px 5px 10px var(--shadow1), inset -5px -5px 10px var(--shadow2) !important; transform: scale(0.97); transition: 0.1s; }
        @keyframes float-up { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-60px) scale(1.3); } }
        .plus-one-animation { position: fixed; color: var(--emart-yellow); font-weight: 900; font-size: 30px; pointer-events: none; z-index: 9999; animation: float-up 0.7s ease-out forwards; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 50% { transform: translateX(6px); } }
        .shake-animation { animation: shake 0.2s ease-in-out; }
        .day-nav { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-bottom:15px; padding:0 10px; }
        .day-btn { padding:10px 15px; border-radius:12px; cursor:pointer; font-weight:bold; background:var(--card-bg); box-shadow:4px 4px 8px var(--shadow1), -4px -4px 8px var(--shadow2); border:none; color:var(--sub-text); font-size:13px; }
        .day-btn.active { background: var(--emart-yellow); color: var(--emart-dark); box-shadow: inset 2px 2px 4px rgba(0,0,0,0.2); }
        .dashboard { display:flex; justify-content:center; gap:12px; flex-wrap:wrap; padding:10px; }
        .card { flex: 1 1 21%; max-width:260px; padding:18px; border-radius:25px; background:var(--card-bg); box-shadow:8px 8px 16px var(--shadow1), -8px -8px 16px var(--shadow2); cursor:pointer; position:relative; overflow:hidden; border: 3px solid transparent; }
        .count-area { margin: 10px auto; pointer-events: none; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .count { font-size:40px; color:var(--emart-yellow); font-weight: 900; line-height: 1; padding: 12px 25px; border-radius: 15px; background: var(--card-bg); box-shadow: inset 5px 5px 10px var(--shadow1), inset -5px -5px 10px var(--shadow2); min-width: 50px; }
        .tally-mark { font-size: 16px; color: var(--sub-text); letter-spacing: 2px; min-height: 20px; }
        .icon { font-size:35px; margin-bottom:8px; pointer-events: none; }
        .title { font-size:16px; font-weight:bold; pointer-events: none; }
        .buttons { display:flex; gap:8px; margin-top:10px; }
        .btn { flex:1; padding:12px; font-size:20px; border:none; border-radius:12px; cursor:pointer; background:var(--card-bg); box-shadow:3px 3px 6px var(--shadow1), -3px -3px 6px var(--shadow2); color:var(--text); font-weight: bold; }
        .main-input { padding:14px; font-size:15px; border:none; border-radius:20px; background:var(--card-bg); box-shadow:inset 4px 4px 8px var(--shadow1), inset -4px -4px 8px var(--shadow2); width:85%; max-width:380px; margin:15px 0; outline:none; text-align:center; color: var(--text); }
        .promo-controller { background: rgba(0,0,0,0.05); padding: 15px; border-radius: 20px; margin: 10px auto; width: 90%; max-width: 500px; display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .tools { margin-bottom:20px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; padding: 0 10px; }
        .tool { padding:10px 14px; border:none; border-radius:12px; cursor:pointer; background:var(--card-bg); box-shadow:3px 3px 6px var(--shadow1), -3px -3px 6px var(--shadow2); font-size:12px; font-weight:bold; color:var(--sub-text); }
        .tool.highlight { background: var(--emart-yellow); color: black; }
        .memo-section { margin: 15px auto; width: 90%; max-width: 580px; text-align: left; }
        .memo-list { margin-top: 8px; background: rgba(0,0,0,0.04); border-radius: 12px; padding: 12px; font-size: 12px; max-height: 100px; overflow-y: auto; color: var(--sub-text); line-height: 1.6; }
        .chart-container { margin: 20px auto; width: 90%; max-width: 580px; padding: 18px; border-radius: 20px; background: var(--card-bg); box-shadow: 8px 8px 16px var(--shadow1), -8px -8px 16px var(--shadow2); }
        .chart-bars { display: flex; align-items: flex-end; justify-content: space-between; height: 80px; border-bottom: 2px solid #666; padding-top:10px; }
        .bar { width: 50%; background: var(--emart-yellow); border-radius: 3px 3px 0 0; }
        #totals { margin: 25px auto; width: 92%; max-width: 600px; padding: 20px 15px; border-radius: 25px; background: var(--emart-dark); color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .total-header { font-size: 13px; color: var(--emart-yellow); margin-bottom: 12px; font-weight: 900; }
        .total-grid { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .total-badge { background: rgba(255, 255, 255, 0.08); padding: 8px 12px; border-radius: 15px; display: flex; align-items: center; gap: 6px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--bg); padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; max-height: 85vh; overflow-y: auto; text-align: left; color: var(--text); }
        .modal-btn { padding: 12px; background: var(--emart-yellow); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="dynamic-island-container">
        <div id="island" class="dynamic-island">
            <div id="island-content" class="island-content">
                <span class="island-icon" id="island-icon">🎁</span>
                <div class="island-text">
                    <span class="island-main" id="island-main">인식 완료!</span>
                    <span class="island-sub" id="island-sub">+1개가 추가되었습니다.</span>
                </div>
            </div>
        </div>
    </div>
    <h1>🎁 사은품 카운터 Ultimate</h1>
    <button id="installBtn">📱 홈 화면에 설치하여 앱처럼 사용</button>

    <div id="webcam-container">
        <video id="webcam" autoplay playsinline muted></video>
        <div style="font-size: 10px; color: white; padding: 2px;">AI 자동 탐지 중...</div>
    </div>
    <div class="day-nav" id="dayNav"></div>
    <div class="dashboard" id="dashboard"></div>
    <input id="barcodeInput" class="main-input" placeholder="바코드 스캔 또는 번호 입력 후 엔터" autofocus>
    
    <div class="promo-controller">
        <div style="font-weight:bold; font-size:14px; margin-right:5px;">📣 다국어 사은품 방송</div>
        <button id="playBtn" class="tool highlight" onclick="togglePromo()">▶ 방송 시작</button>
        <button class="tool" onclick="stopPromo()">⏹ 정지</button>
        <select id="voiceSelect" class="tool" onchange="stopPromo()">
            <option value="ko">🇰🇷 한국어</option><option value="en">🇺🇸 English</option><option value="ja">🇯🇵 日本語</option><option value="zh">🇨🇳 中文</option>
        </select>
    </div>
    <div class="tools">
        <button id="aiToggleBtn" class="tool highlight" onclick="toggleAI()">🤖 AI 자동 카운트</button>
        <button id="voiceToggleBtn" class="tool" onclick="toggleVoiceRecognition()">🎤 음성 카운트</button>
        <button class="tool" onclick="copySummary()">📋 카톡 보고용 복사</button>
        <button class="tool" onclick="undoLastAction()">⏪ 실행 취소</button>
        <button class="tool" onclick="toggleTheme()">🌓 테마 변경</button>
        <button class="tool" onclick="checkAdmin(openSettings)">⚙️ 설정</button>
        <button class="tool" onclick="downloadAdvancedCSV()">📊 엑셀 저장</button>
        <button class="tool" onclick="backupData()">💾 백업</button>
        <button class="tool" onclick="checkAdmin(resetToday)" style="color:#d9534f; border:1px solid #d9534f;">오늘 초기화</button>
        <button class="tool" onclick="checkAdmin(deleteAllData)" style="background:#ff4757; color:white;">⚠️ 전체 삭제</button>
    </div>
    <div class="memo-section">
        <div style="display:flex; gap:8px;">
            <input id="memoInput" class="main-input" style="flex:1; margin:0;" placeholder="특이사항 메모...">
            <button class="tool" style="margin:0;" onclick="addMemo()">기록</button>
        </div>
        <div class="memo-list" id="memoList"></div>
    </div>
    <div class="chart-container">
        <div style="font-size:12px; margin-bottom:10px; font-weight:bold; color:var(--sub-text);">📈 시간대별 배포 추이</div>
        <div class="chart-bars" id="hourlyChart"></div>
    </div>
    <div id="totals"></div>
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h3 style="margin-top:0;">⚙️ 시스템 설정</h3>
            <div id="settingsItems"></div>
            <hr style="border:0.5px solid #ccc; margin:15px 0;">
            <p style="font-size:12px; color:var(--sub-text);">관리자 비밀번호 변경 (기본: 0000)</p>
            <input type="password" id="adminPwInput" class="main-input" style="width:92%; margin:5px 0;" placeholder="새 비밀번호">
            <button class="modal-btn" onclick="saveSettings()">저장 및 적용</button>
            <button class="modal-btn" style="background:#bbb;" onclick="closeSettings()">닫기</button>
        </div>
    </div>

    <script>
        // PWA 통합 설치 로직
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        });

        (function initPWA() {
            const manifest = { "name": "사은품 카운터", "short_name": "카운터", "start_url": ".", "display": "standalone", "background_color": "#e0e0e0", "theme_color": "#FFB81C", "icons": [{"src": "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎁</text></svg>", "sizes": "512x512", "type": "image/svg+xml", "purpose": "any maskable"}] };
            const manifestUrl = URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type: 'application/json'}));
            document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${manifestUrl}">`);
            if ('serviceWorker' in navigator) {
                const swBlob = new Blob([`self.addEventListener('fetch', () => {});`], {type: 'application/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(swBlob));
            }
        })();

        // 원본 로직 유지
        const DEFAULT_SETTINGS = { days: ["1일차", "2일차", "3일차", "4일차"], adminPw: "0000", items: [{id: "item1", name: "카트", icon: "🛒", barcode: "1", target: 100}, {id: "item2", name: "라면", icon: "🍜", barcode: "2", target: 200}, {id: "item3", name: "물티슈", icon: "🧻", barcode: "3", target: 150}, {id: "item4", name: "배달", icon: "🚚", barcode: "4", target: 50}] };
        let currentDay = 'day1', undoStack = [], isPlaying = false, model = null, isAiRunning = false, lastDetectedTime = 0;
        let storageData = JSON.parse(localStorage.getItem("giftDataUltimateV1")) || { counts: { day1:{}, day2:{}, day3:{}, day4:{} }, logs: [], memos: [], settings: JSON.parse(JSON.stringify(DEFAULT_SETTINGS))};
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playCountSound() { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
        function showIsland(icon, title, sub) { const island = document.getElementById('island'); document.getElementById('island-icon').textContent = icon; document.getElementById('island-main').textContent = title; document.getElementById('island-sub').textContent = sub; island.classList.add('active'); setTimeout(() => island.classList.remove('active'), 3000); }
        function getTallyMarks(num) { const chars = ["", "一", "丅", "丄", "止", "正"]; const fullMarks = Math.floor(num / 5); return "正".repeat(fullMarks) + chars[num % 5]; }
        function save() { localStorage.setItem("giftDataUltimateV1", JSON.stringify(storageData)); }
        function increment(itemId, event) { if (navigator.vibrate) navigator.vibrate(35); playCountSound(); if (event && event.clientX) { const span = document.createElement("span"); span.textContent = "+1"; span.className = "plus-one-animation"; span.style.left = event.clientX + "px"; span.style.top = (event.clientY - 40) + "px"; document.body.appendChild(span); setTimeout(() => span.remove(), 700); } if(!storageData.counts[currentDay][itemId]) storageData.counts[currentDay][itemId] = 0; storageData.counts[currentDay][itemId]++; const item = storageData.settings.items.find(i => i.id === itemId); showIsland(item.icon, `${item.name} 추가!`, `누적: ${storageData.counts[currentDay][itemId]}개`); storageData.logs.push({ time: new Date().toLocaleTimeString(), day: currentDay, item: itemId, hour: new Date().getHours() }); undoStack.push({ type:'inc', day:currentDay, item:itemId }); save(); render(); }
        function decrement(itemId) { if (storageData.counts[currentDay][itemId] > 0) { storageData.counts[currentDay][itemId]--; save(); render(); } }
        async function toggleAI() { const btn = document.getElementById("aiToggleBtn"); const video = document.getElementById("webcam"); if (!isAiRunning) { if (!model) { btn.textContent = "⏳ 로딩..."; model = await cocoSsd.load(); } try { const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }); video.srcObject = stream; document.getElementById("webcam-container").style.display = "block"; isAiRunning = true; btn.textContent = "⏹ AI 중지"; detectFrame(video); showIsland("🤖", "AI 모드 시작", "자동 탐지를 시작합니다."); } catch (err) { alert("카메라 권한이 필요합니다."); } } else { isAiRunning = false; if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop()); document.getElementById("webcam-container").style.display = "none"; btn.textContent = "🤖 AI 자동 카운트"; } }
        async function detectFrame(video) { if (!isAiRunning) return; const predictions = await model.detect(video); predictions.forEach(p => { if ((p.class === 'bottle' || p.class === 'cell phone') && p.score > 0.85) { const now = Date.now(); if (now - lastDetectedTime > 2500) { increment('item1'); lastDetectedTime = now; document.getElementById("webcam-container").style.borderColor = "#2ed573"; setTimeout(() => document.getElementById("webcam-container").style.borderColor = "var(--emart-yellow)", 500); } } }); requestAnimationFrame(() => detectFrame(video)); }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition; let recognition = SpeechRecognition ? new SpeechRecognition() : null; let isVoiceRunning = false; if (recognition) { recognition.continuous = true; recognition.lang = 'ko-KR'; recognition.onresult = (event) => { const transcript = event.results[event.results.length - 1][0].transcript.trim(); storageData.settings.items.forEach(item => { if (transcript.includes(item.name)) increment(item.id); }); }; }
        function toggleVoiceRecognition() { if (!recognition) return alert("지원하지 않는 브라우저입니다."); const btn = document.getElementById("voiceToggleBtn"); if (isVoiceRunning) { recognition.stop(); isVoiceRunning = false; btn.classList.remove("highlight"); btn.textContent = "🎤 음성 카운트"; } else { recognition.start(); isVoiceRunning = true; btn.classList.add("highlight"); btn.textContent = "⏹ 음성 중지"; showIsland("🎤", "음성 카운트 활성화", "상품 이름을 말하세요."); } }
        function render() { const counts = storageData.counts[currentDay] || {}; document.getElementById("dashboard").innerHTML = storageData.settings.items.map(item => { const count = counts[item.id] || 0; return `<div class="card" onclick="increment('${item.id}', event)"><div class="icon">${item.icon}</div><div class="title">${item.name}</div><div class="count-area"><div class="count">${count}</div><div class="tally-mark">${getTallyMarks(count)}</div></div><div class="buttons"><button class="btn" onclick="event.stopPropagation(); increment('${item.id}', event)">+</button><button class="btn" onclick="event.stopPropagation(); decrement('${item.id}')">-</button></div></div>`; }).join(''); renderNav(); updateTotals(); updateChart(); renderMemos(); }
        function renderNav() { document.getElementById("dayNav").innerHTML = storageData.settings.days.map((day, idx) => `<button class="day-btn ${currentDay==='day'+(idx+1)?'active':''}" onclick="currentDay='day${idx+1}'; render();">${day}</button>`).join(''); }
        function updateTotals() { let totals = {}; storageData.settings.items.forEach(it => { totals[it.id] = { icon: it.icon, count: 0 }; for(let d in storageData.counts) totals[it.id].count += (storageData.counts[d][it.id] || 0); }); let html = `<div class="total-header">📊 전 기간 누적 합계</div><div class="total-grid">`; Object.values(totals).forEach(d => { html += `<div class="total-badge"><span>${d.icon}</span><span>${d.count.toLocaleString()}</span></div>`; }); document.getElementById("totals").innerHTML = html + `</div>`; }
        function updateChart() { const hourly = new Array(24).fill(0); storageData.logs.filter(l => l.day === currentDay).forEach(l => hourly[l.hour]++); let html = ""; const maxVal = Math.max(...hourly, 1); for(let i = 10; i <= 21; i++) { const h = (hourly[i] / maxVal) * 100; html += `<div style="flex:1; display:flex; flex-direction:column; align-items:center;"><span style="font-size:8px;">${hourly[i]||''}</span><div class="bar" style="height:${h}%"></div><span style="font-size:8px; margin-top:3px;">${i}</span></div>`; } document.getElementById("hourlyChart").innerHTML = html; }
        function checkAdmin(cb) { const pw = prompt("비밀번호 입력:"); if(pw === storageData.settings.adminPw) cb(); else if(pw !== null) alert("틀렸습니다."); }
        function openSettings() { document.getElementById("settingsItems").innerHTML = storageData.settings.items.map((item, idx) => `<div style="display:flex; gap:5px; margin-bottom:5px;"><input class="tool" style="width:35px; text-align:center;" id="s_icon_${idx}" value="${item.icon}"><input class="tool" style="flex:1;" id="s_name_${idx}" value="${item.name}"><input class="tool" style="width:50px;" id="s_bc_${idx}" value="${item.barcode}"></div>`).join(''); document.getElementById("settingsModal").classList.add("show"); }
        function closeSettings() { document.getElementById("settingsModal").classList.remove("show"); }
        function saveSettings() { storageData.settings.items.forEach((item, idx) => { item.icon = document.getElementById(`s_icon_${idx}`).value; item.name = document.getElementById(`s_name_${idx}`).value; item.barcode = document.getElementById(`s_bc_${idx}`).value; }); save(); closeSettings(); render(); }
        function togglePromo() { if (isPlaying) return stopPromo(); const lang = document.getElementById("voiceSelect").value; const scripts = { 'ko': "사은행사 안내드립니다. 사은품은 8만원 이상 구매 시 증정해 드립니다.", 'en': "Welcome! Free gifts are available.", 'ja': "いらっしゃいませ。プレゼント를差し上げます。", 'zh': "欢迎光临。领取您的赠品。" }; const msg = new SpeechSynthesisUtterance(scripts[lang]); msg.lang = lang; msg.onend = () => { isPlaying = false; document.getElementById("playBtn").textContent = "▶ 방송 시작"; }; window.speechSynthesis.speak(msg); isPlaying = true; document.getElementById("playBtn").textContent = "■ 방송 중..."; }
        function stopPromo() { window.speechSynthesis.cancel(); isPlaying = false; document.getElementById("playBtn").textContent = "▶ 방송 시작"; }
        function toggleTheme() { document.body.classList.toggle('dark-mode'); }
        function copySummary() { let text = `[현황보고]\n`; storageData.settings.items.forEach(item => { text += `${item.icon} ${item.name}: ${storageData.counts[currentDay][item.id] || 0}개\n`; }); navigator.clipboard.writeText(text).then(() => alert("복사 완료!")); }
        function addMemo() { const input = document.getElementById("memoInput"); if(!input.value.trim()) return; storageData.memos.push({ day: currentDay, text: `[${new Date().toLocaleTimeString()}] ${input.value}` }); input.value = ""; save(); renderMemos(); }
        function renderMemos() { const filtered = storageData.memos.filter(m => m.day === currentDay); document.getElementById("memoList").innerHTML = filtered.length ? filtered.map(m => `<div>${m.text}</div>`).reverse().join('') : "기록 없음"; }
        function undoLastAction() { if (undoStack.length === 0) return alert("기록 없음"); const a = undoStack.pop(); if(a.type === 'inc') { storageData.counts[a.day][a.item]--; } save(); render(); }
        function resetToday() { storageData.counts[currentDay] = {}; storageData.logs = storageData.logs.filter(l => l.day !== currentDay); save(); render(); }
        function deleteAllData() { if(confirm("전체 삭제?")) { localStorage.removeItem("giftDataUltimateV1"); location.reload(); } }
        function downloadAdvancedCSV() { let csv = "\uFEFF품목,합계\n"; storageData.settings.items.forEach(item => { let sum = 0; for(let d in storageData.counts) sum += (storageData.counts[d][item.id] || 0); csv += `${item.name},${sum}\n`; }); const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' })); link.download = `사은품_보고서.csv`; link.click(); }
        function backupData() { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(storageData)], {type:"application/json"})); a.download = `backup.json`; a.click(); }
        document.getElementById("barcodeInput").addEventListener("keypress", (e) => { if (e.key === 'Enter') { const val = document.getElementById("barcodeInput").value.trim(); const item = storageData.settings.items.find(i => i.barcode === val); if (item) { increment(item.id); document.body.classList.add("shake-animation"); setTimeout(() => document.body.classList.remove("shake-animation"), 200); } document.getElementById("barcodeInput").value = ''; } });
        render();
    </script>
</body>
</html>
