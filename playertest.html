<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple TV Premium - Dynamic Hide Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --apple-blue: #007aff;
            --white-glass: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.5);
            --apple-blur: blur(35px);
            --text-dark: #1d1d1f;
            --live-red: #ff3b30;
            --apple-ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; }
        
        .player-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #000; }
        .player-container.hide-cursor { cursor: none; }
        video { width: 100%; height: 100%; object-fit: contain; z-index: 1; transition: 0.6s var(--apple-ease); cursor: pointer; }
        
        .player-container.show-more video { transform: translateY(-40px) scale(0.95); filter: brightness(0.5); }

        /* 배경 블러 레이어 */
        .backdrop-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            z-index: 50; transition: 0.6s var(--apple-ease); opacity: 0; pointer-events: none;
        }
        .player-container.show-more .backdrop-overlay { height: 50%; opacity: 1; }

        /* [수정] 중앙 인터페이스 - 버튼 즉시 숨김 최적화 */
        .center-interface { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 60; pointer-events: none; }
        
        .main-center-btn { 
            width: 95px; height: 95px; border-radius: 50%; background: rgba(255,255,255,0.2);
            backdrop-filter: var(--apple-blur); -webkit-backdrop-filter: var(--apple-blur); border: 1px solid rgba(255,255,255,0.3);
            color: white; display: flex; align-items: center; justify-content: center; font-size: 32px;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            opacity: 0; pointer-events: auto;
            transition: opacity 0.4s var(--apple-ease), transform 0.4s var(--apple-ease);
        }
        
        /* 마우스 움직일 때만 잠깐 보임 */
        .player-container.user-active .main-center-btn { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        
        /* [중요] 클릭된 상태 - 강제로 즉시 숨김 */
        .main-center-btn.force-hide { opacity: 0 !important; transform: translate(-50%, -50%) scale(1.3); transition: opacity 0s, transform 0.2s !important; }

        /* 리플 애니메이션 (버튼 대신 피드백 담당) */
        .status-ripple {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 140px; height: 140px; background: rgba(255,255,255,0.2);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 45px; opacity: 0; z-index: 61; pointer-events: none;
        }
        .status-ripple.animate { animation: ripple-out 0.6s var(--apple-ease); }
        @keyframes ripple-out {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            40% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
        }

        /* 컨트롤 레이어 */
        .controls-layer {
            position: absolute; bottom: 0; width: 100%; padding: 60px 0 35px;
            opacity: 0; transform: translateY(15px); transition: 0.5s var(--apple-ease); z-index: 110;
        }
        .player-container.user-active .controls-layer { opacity: 1; transform: translateY(0); }
        .controls-content { width: 92%; max-width: 1150px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }

        .up-next-shelf {
            display: flex; gap: 20px; overflow-x: auto; height: 0; opacity: 0;
            transition: 0.5s var(--apple-ease); margin-bottom: 15px; scrollbar-width: none; padding: 0 10px;
        }
        .player-container.show-more .up-next-shelf { height: 185px; opacity: 1; }
        .video-card { flex: 0 0 250px; cursor: pointer; transition: 0.3s; }
        .thumb { width: 100%; height: 140px; border-radius: 16px; overflow: hidden; border: 1.5px solid var(--glass-border); box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .card-title { color: white; font-size: 14px; font-weight: 600; padding: 12px 2px 0; text-shadow: 0 2px 5px rgba(0,0,0,0.9); }

        .control-bar {
            background: var(--white-glass); backdrop-filter: var(--apple-blur); -webkit-backdrop-filter: var(--apple-blur);
            padding: 8px 25px; border-radius: 50px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--glass-border); box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        .group { display: flex; align-items: center; gap: 12px; }

        .btn { background: none; border: none; color: var(--text-dark); cursor: pointer; font-size: 19px; width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; position: relative; }
        .btn:hover { background: rgba(255,255,255,0.35); transform: scale(1.1); }
        .btn.active { color: var(--apple-blue); }

        .apple-select { background: rgba(255,255,255,0.25); border: 1px solid rgba(0,0,0,0.1); border-radius: 10px; padding: 6px 10px; font-size: 12px; font-weight: 800; color: var(--text-dark); outline: none; }

        .progress-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: #fff; width: 0%; border-radius: 10px; transition: width 0.1s linear; }
        .live-badge { background: var(--live-red); color: white; padding: 4px 9px; border-radius: 6px; font-size: 10px; font-weight: 900; animation: pulse-live 2s infinite; }
        @keyframes pulse-live { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>

<div class="player-container" id="player">
    <video id="mainVid" src="https://videos.pexels.com/video-files/853889/853889-hd_1920_1080_25fps.mp4" playsinline crossorigin="anonymous"></video>
    
    <div class="backdrop-overlay"></div>

    <div class="center-interface">
        <div class="main-center-btn" id="centerPlayBtn"><i class="fas fa-play"></i></div>
        <div class="status-ripple" id="statusRipple"><i class="fas fa-play"></i></div>
    </div>

    <div class="controls-layer">
        <div class="controls-content">
            <div class="up-next-shelf" id="shelf">
                <div class="video-card"><div class="thumb"><img src="https://picsum.photos/400/225?r=91"></div><div class="card-title">다음 추천 영상 01</div></div>
                <div class="video-card"><div class="thumb"><img src="https://picsum.photos/400/225?r=92"></div><div class="card-title">다음 추천 영상 02</div></div>
                <div class="video-card"><div class="thumb"><img src="https://picsum.photos/400/225?r=93"></div><div class="card-title">다음 추천 영상 03</div></div>
            </div>

            <div class="progress-wrapper" id="scrubHandler" style="width:100%; height:20px; cursor:pointer; display:flex; align-items:center;">
                <div class="progress-bg"><div class="progress-fill" id="progressFill"></div></div>
            </div>

            <div class="control-bar">
                <div class="group">
                    <div class="live-badge">LIVE</div>
                    <button class="btn" id="playPause"><i class="fas fa-play"></i></button>
                    <span style="font-size:13px; font-weight:700; color:var(--text-dark);" id="timeDisplay">0:00 / 0:00</span>
                </div>
                <div class="group">
                    <button class="btn" id="ccBtn"><i class="fas fa-closed-captioning"></i></button>
                    <select class="apple-select" id="speedIdx"><option value="0.5">0.5x</option><option value="1" selected>1.0x</option><option value="1.5">1.5x</option><option value="2">2.0x</option></select>
                    <button class="btn" id="moreBtn"><i class="fas fa-layer-group"></i></button>
                    <button class="btn" id="pipBtn"><i class="fas fa-external-link-alt"></i></button>
                    <button class="btn" id="fullScreen"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('mainVid'), p = document.getElementById('player'),
          playBtn = document.getElementById('playPause'), centerBtn = document.getElementById('centerPlayBtn'),
          ripple = document.getElementById('statusRipple'), fill = document.getElementById('progressFill'),
          scrub = document.getElementById('scrubHandler'), speedSelect = document.getElementById('speedIdx'),
          ccBtn = document.getElementById('ccBtn'), moreBtn = document.getElementById('moreBtn');

    // UI 활성화 관리
    function activeUI() {
        p.classList.add('user-active');
        p.classList.remove('hide-cursor');
        
        // 마우스를 움직이면 강제 숨김 해제 (다시 나타날 수 있게 함)
        centerBtn.classList.remove('force-hide'); 

        clearTimeout(window.idleTimer);
        // 재생 중일 때만 3초 뒤 숨김
        if(!v.paused && !p.classList.contains('show-more')) {
            window.idleTimer = setTimeout(() => { 
                p.classList.remove('user-active'); 
                p.classList.add('hide-cursor'); 
            }, 3000);
        }
    }
    p.onmousemove = activeUI;

    // 재생/일시정지 토글
    function togglePlay() {
        const rippleIcon = ripple.querySelector('i');
        
        // [수정] 중앙 버튼 즉시 숨김 로직
        centerBtn.classList.add('force-hide');
        
        if(v.paused) {
            v.play();
            updateIcons('fa-pause');
            rippleIcon.className = 'fas fa-play';
        } else {
            v.pause();
            updateIcons('fa-play');
            rippleIcon.className = 'fas fa-pause';
        }

        // 리플 애니메이션만 실행
        ripple.classList.remove('animate');
        void ripple.offsetWidth;
        ripple.classList.add('animate');

        // 재생 시작 시 컨트롤 레이어 빨리 숨기기
        if(!v.paused) {
            clearTimeout(window.idleTimer);
            window.idleTimer = setTimeout(() => { p.classList.remove('user-active'); }, 1200);
        }
    }

    function updateIcons(cls) {
        const html = `<i class="fas ${cls}"></i>`;
        playBtn.innerHTML = html;
        centerBtn.innerHTML = html;
    }

    [v, centerBtn, playBtn].forEach(el => el.onclick = (e) => {
        if(p.classList.contains('show-more') && el === v) { p.classList.remove('show-more'); return; }
        e.stopPropagation();
        togglePlay();
    });

    // 기타 기능
    moreBtn.onclick = (e) => { e.stopPropagation(); p.classList.toggle('show-more'); activeUI(); };
    speedSelect.onchange = () => v.playbackRate = parseFloat(speedSelect.value);
    ccBtn.onclick = (e) => { e.stopPropagation(); const tracks = v.textTracks[0]; if (tracks) { tracks.mode = tracks.mode === 'showing' ? 'hidden' : 'showing'; ccBtn.classList.toggle('active'); } };
    document.getElementById('pipBtn').onclick = (e) => { e.stopPropagation(); if (document.pictureInPictureElement) document.exitPictureInPicture(); else v.requestPictureInPicture(); };
    document.getElementById('fullScreen').onclick = (e) => { e.stopPropagation(); if (!document.fullscreenElement) p.requestFullscreen(); else document.exitFullscreen(); };

    v.ontimeupdate = () => {
        fill.style.width = (v.currentTime / v.duration) * 100 + '%';
        const fmt = (t) => { let m = Math.floor(t / 60), s = Math.floor(t % 60); return isNaN(t) ? '0:00' : `${m}:${s < 10 ? '0' + s : s}`; };
        document.getElementById('timeDisplay').textContent = `${fmt(v.currentTime)} / ${fmt(v.duration)}`;
    };

    scrub.onclick = (e) => {
        const rect = scrub.getBoundingClientRect();
        v.currentTime = ((e.clientX - rect.left) / rect.width) * v.duration;
    };
</script>
</body>
</html>
