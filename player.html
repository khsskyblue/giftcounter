<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Apple TV Style YouTube Hub</title>
    <style>
        :root {
            --bg: #000;
            --card-w: 300px;
            --card-h: 170px;
            --glass: rgba(255, 255, 255, 0.1);
            --focus-scale: 1.15;
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* 상단 대형 히어로 배너 (Top Shelf) */
        #hero-section {
            width: 100vw; height: 60vh;
            position: relative; overflow: hidden;
            display: flex; align-items: flex-end;
            padding: 60px; box-sizing: border-box;
            background: linear-gradient(to top, #000 10%, transparent 100%),
                        url('https://img.youtube.com/vi/V1bFr2SWP1I/maxresdefault.jpg') center/cover;
            transition: background 0.8s ease;
        }
        .hero-content { max-width: 600px; z-index: 10; }
        .hero-title { font-size: 48px; font-weight: 800; margin-bottom: 10px; }
        .hero-desc { font-size: 18px; color: rgba(255,255,255,0.7); margin-bottom: 20px; }

        /* 가로 리스트 섹션 */
        .section-container { margin-top: -50px; padding-left: 60px; position: relative; z-index: 20; }
        .section-title { font-size: 22px; font-weight: 600; margin-bottom: 20px; color: rgba(255,255,255,0.9); }
        
        .shelf {
            display: flex; gap: 30px;
            transition: transform 0.5s cubic-bezier(0.2, 0, 0.2, 1);
            padding: 20px 0;
        }

        /* 애플 TV 스타일 카드 */
        .apple-card {
            min-width: var(--card-w); height: var(--card-h);
            background: var(--glass); border-radius: 12px;
            position: relative; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            outline: 0px solid white;
        }

        /* 포커스 효과: 공중에 뜨고 하이라이트 */
        .apple-card.focused {
            transform: scale(var(--focus-scale));
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            outline: 4px solid rgba(255,255,255,0.9);
            z-index: 100;
        }

        .apple-card img {
            width: 100%; height: 100%; object-fit: cover;
            border-radius: 12px; transition: opacity 0.3s;
        }
        .apple-card .label {
            position: absolute; bottom: -35px; left: 0; width: 100%;
            font-size: 14px; text-align: center; opacity: 0; transition: 0.3s;
        }
        .apple-card.focused .label { opacity: 1; transform: translateY(5px); }

        /* 플레이어 모달 */
        #modal {
            position: fixed; inset: 0; background: #000;
            display: none; z-index: 9999;
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="hero-section">
        <div class="hero-content">
            <div class="hero-title" id="h-title">Interstellar Soundtrack</div>
            <div class="hero-desc" id="h-desc">한스 짐머의 웅장한 오케스트라 사운드트랙 모음집</div>
        </div>
    </div>

    <div class="section-container">
        <div class="section-title">지금 시청하기</div>
        <div class="shelf" id="shelf">
            </div>
    </div>

    <div id="modal" onclick="closeVideo()">
        <iframe id="player" src="" allow="autoplay; fullscreen"></iframe>
    </div>

    <script>
        const shelf = document.getElementById('shelf');
        const hero = document.getElementById('hero-section');
        const hTitle = document.getElementById('h-title');
        
        const videos = [
            { id: 'V1bFr2SWP1I', title: '인터스텔라 OST', desc: '웅장한 우주의 사운드' },
            { id: 'dQw4w9WgXcQ', title: 'Rick Astley', desc: '전설의 릭롤링' },
            { id: 'RgKAFK5djSk', title: 'Harry Potter', desc: '호그와트로의 초대' },
            { id: 'JGwWNGJdvx8', title: 'Avatar 2', desc: '물의 길 예고편' },
            { id: '9bZkp7q19f0', title: 'PSY - Gangnam Style', desc: 'K-POP의 역사' },
            { id: 'fJ9rUzIMcZQ', title: 'Queen', desc: '보헤미안 랩소디 라이브' },
            { id: 'kJQP7kiw5Fk', title: 'Top Gun', desc: '최고의 공중 액션' }
        ];

        let idx = 0;

        // 1. 카드 생성
        function init() {
            videos.forEach((v, i) => {
                const card = document.createElement('div');
                card.className = `apple-card ${i === 0 ? 'focused' : ''}`;
                card.innerHTML = `
                    <img src="https://img.youtube.com/vi/${v.id}/maxresdefault.jpg">
                    <div class="label">${v.title}</div>
                `;
                card.onclick = () => playVideo(v.id);
                shelf.appendChild(card);
            });
        }

        // 2. 키보드 네비게이션 (Apple TV 리모컨 경험)
        window.addEventListener('keydown', (e) => {
            const cards = document.querySelectorAll('.apple-card');
            cards[idx].classList.remove('focused');

            if (e.key === 'ArrowRight' && idx < videos.length - 1) idx++;
            else if (e.key === 'ArrowLeft' && idx > 0) idx--;
            else if (e.key === 'Enter') playVideo(videos[idx].id);
            else if (e.key === 'Escape') closeVideo();

            const target = cards[idx];
            target.classList.add('focused');

            // 포커스 된 영상에 맞춰 히어로 섹션 배경 및 정보 변경
            hero.style.backgroundImage = `linear-gradient(to top, #000 10%, transparent 100%), url('https://img.youtube.com/vi/${videos[idx].id}/maxresdefault.jpg')`;
            hTitle.innerText = videos[idx].title;

            // 가로 스크롤 이동
            const offset = idx * (300 + 30); // 너비 + 간격
            shelf.style.transform = `translateX(${-offset}px)`;
        });

        function playVideo(id) {
            document.getElementById('player').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeVideo() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('player').src = '';
        }

        init();
    </script>
</body>
</html>
